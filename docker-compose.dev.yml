services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: django_backend
    env_file:
      - ./.env
    environment:
      DEBUG: "1"
      LOAD_FIXTURE_ON_STARTUP: "1"
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend_dev
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      API_INTERNAL_URL: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: iet_shop_redis_dev
    ports:
      - "6379:6379"
