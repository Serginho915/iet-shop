services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: django_backend
    restart: always
    environment:
      DEBUG: "0"
      LOAD_FIXTURE_ON_STARTUP: "1"
      SESSION_COOKIE_SECURE: "1"
      CSRF_COOKIE_SECURE: "1"
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - media_data:/app/media
    ports:
      - "8007:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://haldaniko.com.ua}
    container_name: frontend_prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: iet_shop_redis_prod
    restart: always

volumes:
  media_data:
