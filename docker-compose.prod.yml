services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: django_backend
    restart: always
    environment:
      DEBUG: ${DEBUG:-0}
      LOAD_FIXTURE_ON_STARTUP: ${LOAD_FIXTURE_ON_STARTUP:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-0}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-Lax}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,haldaniko.com.ua,www.haldaniko.com.ua}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://haldaniko.com.ua,https://www.haldaniko.com.ua}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://haldaniko.com.ua,https://www.haldaniko.com.ua}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-1}
      USE_X_FORWARDED_PROTO: ${USE_X_FORWARDED_PROTO:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/media:/app/media
    ports:
      - "8007:8000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://haldaniko.com.ua}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://haldaniko.com.ua}
    container_name: frontend_prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: iet_shop_redis_prod
    restart: always
